{% extends 'bugs/base.html' %}

{% block content %}
<div class="card">
    <h1>Login</h1>

    {% if form.errors %}
        <p style="color: #e74c3c; margin: 15px 0;">Invalid username or password.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn">Login</button>
    </form>
</div>
{% endblock %}
